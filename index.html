<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bianca T. Kim, Ph.D. | Law & Literature</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Serif+KR:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FCFCFC; color: #001A35; }
        .font-serif { font-family: 'Noto Serif KR', serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #001A35; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-select-none { user-select: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('intro');
            const [isAdmin, setIsAdmin] = useState(false);
            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [password, setPassword] = useState('');
            const [selectedResearch, setSelectedResearch] = useState(null);
            const [selectedArchive, setSelectedArchive] = useState(null);

            const [draggingId, setDraggingId] = useState(null);
            const [offset, setOffset] = useState({ x: 0, y: 0 });
            const mapRef = useRef(null);

            const [archiveData, setArchiveData] = useState([
                { id: 1, x: 120, y: 100, category: "철학", title: "푸코의 감시와 처벌", content: "권력의 가시성과 법적 주체의 형성 과정에 대한 메모...", connections: [2, 4], link: "#" },
                { id: 2, x: 500, y: 70, category: "비평", title: "현대 문학의 법정", content: "최근 발표된 단편 소설들에서 나타나는 법적 절차의 오류...", connections: [1], link: "#" },
                { id: 3, x: 180, y: 340, category: "판례", title: "표현의 자유와 명예훼손", content: "문학 작품 속 실존 인물 묘사에 관한 최근 대법원 판결 정리...", connections: [4], link: "#" },
                { id: 4, x: 550, y: 380, category: "노트", title: "법과 정의의 상관관계", content: "레비나스의 타자 철학을 법학에 접목시키는 아이디어...", connections: [1, 3], link: "#" },
            ]);

            const researchData = [
                { id: 1, title: "법과 문학: 서사적 정의의 재구성", summary: "현대 법철학 체계 내에서 문학적 서사가 가지는 치유적 기능을 탐구합니다.", image: "https://images.unsplash.com/photo-1589829545856-d10d557cf95f?auto=format&fit=crop&w=800&q=80", abstract: "이 연구는 법적 판단의 객관성 뒤에 숨겨진 인간적 서사를 문학적 관점에서 분석하여, 법이 놓치기 쉬운 '구체적 정의'를 어떻게 실현할 수 있을지 논의합니다." },
                { id: 2, title: "19세기 소설에 나타난 형벌 제도의 상징성", summary: "도스토옙스키와 빅토르 위고의 작품을 중심으로 당대 행형법을 분석합니다.", image: "https://images.unsplash.com/photo-1505664194779-8beaceb93744?auto=format&fit=crop&w=800&q=80", abstract: "근대 형법의 성립 과정에서 문학이 대중의 법 감정에 미친 영향과, 소설 속 공간이 형벌의 상징으로 기능하는 방식을 고찰합니다." }
            ];

            const youtubeVideos = [
                { id: "v1", title: "삐찌의 귀여운 순간들", url: "https://www.youtube.com/embed/w_hC1J9JVOE?si=JL3DrA-UIeHZRzBb", originalUrl: "https://youtu.be/w_hC1J9JVOE?si=lrcrnjO-jhJMHxGf" },
                { id: "v2", title: "피츄와 첫만남", url: "https://www.youtube.com/embed/eK2HVAoykPQ?si=oOdrjAiNKGFqA7KG", originalUrl: "https://youtu.be/eK2HVAoykPQ?si=y2IDJEQ9_muh9McU" },
                { id: "v3", title: "둘이 함께", url: "https://www.youtube.com/embed/eTf7-AeJNbo?si=NOQk_bCazZArd8WK", originalUrl: "https://youtu.be/eTf7-AeJNbo?si=Lnr9owVDqh8nkvIV" },
            ];

            const handleMouseDown = (e, node) => {
                if (!isAdmin) return;
                setDraggingId(node.id);
                setOffset({ x: e.clientX - node.x, y: e.clientY - node.y });
            };

            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (draggingId !== null && isAdmin) {
                        setArchiveData(prev => prev.map(n => 
                            n.id === draggingId ? { ...n, x: e.clientX - offset.x, y: e.clientY - offset.y } : n
                        ));
                    }
                };
                const handleMouseUp = () => setDraggingId(null);
                if (draggingId !== null) {
                    window.addEventListener('mousemove', handleMouseMove);
                    window.addEventListener('mouseup', handleMouseUp);
                }
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseup', handleMouseUp);
                };
            }, [draggingId, offset, isAdmin]);

            const handleAdminLogin = () => {
                if (password === '8066') { 
                    setIsAdmin(true);
                    setShowPasswordModal(false);
                    setPassword('');
                } else { alert('비밀번호가 올바르지 않습니다.'); }
            };

            const copyDataToClipboard = () => {
                const dataStr = JSON.stringify(archiveData, null, 2);
                navigator.clipboard.writeText(dataStr).then(() => {
                    alert('좌표가 포함된 최신 JSON 데이터가 복사되었습니다. 코드의 archiveData 부분을 교체하세요.');
                });
            };

            return (
                <div className={`min-h-screen ${draggingId ? 'user-select-none' : ''}`}>
                    <nav className="fixed top-0 w-full bg-[#001A35] text-white z-50 px-10 py-6 flex justify-between items-center shadow-2xl">
                        <div className="text-2xl font-black tracking-tighter italic">
                           Bianca T.<span className="text-[#FFB800]">Kim</span>, Ph.D.
                        </div>
                        <div className="hidden md:flex space-x-12 items-center">
                            {['intro', 'research', 'archive', 'youtube'].map((tab) => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`text-lg font-bold tracking-widest uppercase transition-all ${activeTab === tab ? 'text-[#FFB800]' : 'hover:text-[#FFB800]/70'}`}>{tab === 'intro' ? 'Profile' : tab === 'research' ? 'Scholarship' : tab === 'archive' ? 'Resources' : 'Multimedia'}</button>
                            ))}
                            <button onClick={() => isAdmin ? setIsAdmin(false) : setShowPasswordModal(true)} className={`w-10 h-10 flex items-center justify-center rounded-full transition-colors ${isAdmin ? 'bg-[#FFB800] text-[#001A35]' : 'bg-white/10 text-white/40'}`}>
                                <i className={`fa-solid ${isAdmin ? 'fa-unlock' : 'fa-lock'}`}></i>
                            </button>
                        </div>
                    </nav>

                    <main className="pt-32 pb-20 px-8 max-w-7xl mx-auto">
                        {activeTab === 'intro' && (
                            <div className="fade-in space-y-12">
                                <section className="flex flex-col md:flex-row gap-12 items-center md:items-start py-6">
                                    <div className="w-48 md:w-56 shrink-0 text-center md:text-left">
                                        <div className="aspect-[3/4] bg-[#001A35] rounded-2xl overflow-hidden shadow-xl flex items-center justify-center border-2 border-[#FFB800]/20">
                                            <img src="./images/Bianca_Kim.jpg" className="w-full h-full object-cover" alt="Bianca Kim" />
                                        </div>
                                        <div className="mt-6">
                                            <h1 className="text-3xl font-black tracking-tight text-[#001A35]">Bianca Taerim Kim</h1>
                                            <p className="text-[#800020] font-bold mt-1 tracking-widest text-xs">Classical Korean Literature, Ph.D.</p>
                                        </div>
                                    </div>
                                    <div className="flex-1 pt-4 space-y-8">
                                        <div className="space-y-6">
                                            <h2 className="text-5xl font-black leading-[1.1] text-[#001A35]">문장 속의 정의를 <br/><span className="text-[#800020]">법전 위로</span> 길어올리다.</h2>
                                            <p className="text-xl text-gray-600 leading-relaxed font-serif max-w-3xl">법학의 논리적 완결성과 문학의 서사적 진실이 교차하는 지점을 탐구합니다. 저는 텍스트 너머의 인간을 이해하고, 그것을 제도적 언어로 번역하는 작업을 수행합니다.</p>
                                        </div>
                                    </div>
                                </section>
                                <div className="w-full bg-white border border-gray-100 rounded-[32px] p-12 shadow-sm relative overflow-hidden font-serif">
                                    <div className="absolute top-0 right-0 w-48 h-48 bg-[#FFB800]/5 rounded-full -mr-24 -mt-24"></div>
                                    <h3 className="text-xs font-black font-sans text-[#800020] mb-10 flex items-center gap-3 tracking-[0.5em]"><div className="w-6 h-1 bg-[#800020]"></div> Curriculum Vitae</h3>
                                    <div className="grid grid-cols-1 gap-10 relative z-10">
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 items-start border-b border-gray-50 pb-8"><span className="font-black font-sans text-[#001A35]/30 italic uppercase">Academic Qualifications</span><div className="md:col-span-3"><p className="text-xl font-black italic">XX대학교 대학원 법학박사 (Ph.D.)</p><p className="text-sm text-gray-400 mt-1">학위논문: 문학적 서사가 법적 판단에 미치는 영향에 관한 고찰</p></div></div>
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 items-start border-b border-gray-100 pb-8"><span className="font-black font-sans text-[#001A35]/30 italic uppercase">Specializations</span><div className="md:col-span-3 flex flex-wrap gap-3">{['법철학', '서사법학', '19세기 소설', '형벌 이론'].map(tag => (<span key={tag} className="px-4 py-1.5 bg-gray-50 text-[#001A35] text-xs font-black rounded-lg border border-gray-200">#{tag}</span>))}</div></div>
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 items-start">
                                            <span className="font-black font-sans text-[#001A35]/30 italic uppercase">Professional</br>Appointments</span>
                                            <div className="md:col-span-3 space-y-6">
                                                <div className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-8 pb-4 border-b border-gray-50">
                                                    <span className="text-[#800020] font-black text-sm min-w-[120px]">202X - 현재</span>
                                                    <span className="text-[#001A35] font-bold">XX학술연구소 상임연구원</span>
                                                </div>
                                                <div className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-8">
                                                    <span className="text-[#800020] font-black text-sm min-w-[120px]">201X - 202X</span>
                                                    <span className="text-[#001A35] font-bold">한국법문학회 편집위원</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'research' && (
                            <div className="fade-in space-y-16">
                                <div className="mb-16"><h2 className="text-sm font-black text-[#800020] tracking-[0.5em] mb-2 uppercase text-[#800020]">Research Output</h2><h3 className="text-4xl font-black italic text-[#000000]">주요 연구 성과</h3></div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    {researchData.map((item) => (
                                        <div key={item.id} onClick={() => setSelectedResearch(item)} className="bg-white border-2 border-gray-50 p-12 rounded-[40px] cursor-pointer hover:shadow-2xl hover:border-[#800020]/20 hover:-translate-y-2 transition-all duration-500 group relative">
                                            <div className="absolute top-0 right-0 p-8 opacity-5 group-hover:opacity-10 transition-opacity"><i className="fa-solid fa-book-open text-8xl text-[#800020]"></i></div>
                                            <span className="text-xs font-black text-[#800020] tracking-[0.3em] uppercase italic">Publication No.{item.id}</span>
                                            <h4 className="text-2xl font-black mt-4 mb-6 leading-tight group-hover:text-[#800020] transition-colors">{item.title}</h4>
                                            <p className="text-gray-500 mb-10 leading-relaxed line-clamp-2 text-sm">{item.summary}</p>
                                            <div className="inline-flex items-center gap-2 text-[#800020] font-black text-sm group-hover:gap-4 transition-all">자세히 보기 <i className="fa-solid fa-arrow-right"></i></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'archive' && (
                            <div className="fade-in h-[750px] flex flex-col">
                                <div className="flex justify-between items-end mb-8">
                                    <div><h2 className="text-sm font-black text-[#800020] tracking-[0.5em] mb-2 uppercase">Knowledge Network</h2><h3 className="text-4xl font-black italic text-[#001A35]">지식 지도</h3></div>
                                    {isAdmin && <button onClick={copyDataToClipboard} className="flex items-center gap-2 px-6 py-3 bg-[#001A35] text-[#FFB800] hover:bg-[#800020] hover:text-white rounded-xl font-black text-xs transition-all uppercase tracking-widest shadow-lg"><i className="fa-solid fa-copy"></i> Copy Current Map JSON</button>}
                                </div>
                                <div className="flex-1 bg-white border border-gray-100 rounded-[48px] shadow-2xl relative overflow-hidden">
                                    <div className="absolute inset-0 bg-[radial-gradient(#001A35_1.5px,transparent_1.5px)] bg-[length:40px_40px] opacity-[0.05]"></div>
                                    <div ref={mapRef} className="absolute inset-0 p-10 overflow-auto scrollbar-hide">
                                        <div className="relative min-w-[1400px] min-h-[900px]">
                                            <svg className="absolute inset-0 w-full h-full pointer-events-none">
                                                {archiveData.map(node => node.connections.map(targetId => {
                                                    const target = archiveData.find(n => n.id === targetId);
                                                    if (!target || node.id > target.id) return null;
                                                    return <line key={`${node.id}-${target.id}`} x1={node.x + 120} y1={node.y + 60} x2={target.x + 120} y2={target.y + 60} stroke="#FFB800" strokeWidth="2.5" strokeDasharray="8,5" className="opacity-40" />;
                                                }))}
                                            </svg>
                                            {archiveData.map((node) => (
                                                <div 
                                                    key={node.id} 
                                                    onMouseDown={(e) => handleMouseDown(e, node)}
                                                    onClick={() => !isAdmin && setSelectedArchive(node)}
                                                    className={`absolute w-64 p-8 bg-white border border-gray-50 rounded-3xl shadow-lg transition-all z-10 
                                                        ${isAdmin ? 'cursor-move ring-2 ring-dashed ring-[#FFB800]' : 'cursor-pointer hover:shadow-2xl hover:border-[#FFB800] hover:-translate-y-1'}`}
                                                    style={{ left: node.x, top: node.y }}
                                                >
                                                    <div className="text-[10px] font-black text-[#800020] mb-3 tracking-[0.2em] uppercase">{node.category}</div>
                                                    <h4 className="font-black text-base leading-tight text-[#001A35]">{node.title}</h4>
                                                    <div className="mt-4 flex justify-end text-[#FFB800]">
                                                        <i className={`fa-solid ${isAdmin ? 'fa-up-down-left-right' : 'fa-maximize'} text-xs opacity-50`}></i>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    {isAdmin && <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-[#FFB800] text-[#001A35] px-6 py-2 rounded-full text-xs font-black shadow-lg animate-bounce">ADMIN: 카드를 드래그하여 배치하세요</div>}
                                </div>
                            </div>
                        )}

                        {activeTab === 'youtube' && (
                            <div className="fade-in space-y-16">
                                <div className="mb-16"><h2 className="text-sm font-black text-[#800020] tracking-[0.5em] mb-2 uppercase">Video Lectures</h2><h3 className="text-4xl font-black italic text-[#001A35]">아카이브 영상</h3></div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-16">
                                    {youtubeVideos.map((video) => (
                                        <div key={video.id} className="group">
                                            <div className="aspect-video bg-[#001A35] rounded-[32px] overflow-hidden shadow-2xl relative border-b-[10px] border-[#FFB800]"><iframe width="100%" height="100%" src={video.url} frameBorder="0" allowFullScreen className="opacity-95 group-hover:opacity-100 transition-opacity"></iframe></div>
                                            <div className="mt-8 px-2"><a href={video.originalUrl} target="_blank" rel="noopener noreferrer" className="text-2xl font-black hover:text-[#800020] transition-colors inline-block">{video.title} <i className="fa-solid fa-arrow-up-right-from-square text-sm ml-2"></i></a><p className="text-xs text-gray-400 font-mono mt-3 tracking-widest uppercase italic font-black">Lecture Archive</p></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {selectedResearch && (
                        <div className="fixed inset-0 bg-[#001A35]/95 z-[100] flex items-center justify-center p-6" onClick={() => setSelectedResearch(null)}>
                            <div className="bg-white rounded-[40px] max-w-4xl w-full max-h-[90vh] overflow-y-auto p-12 relative shadow-2xl" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setSelectedResearch(null)} className="absolute top-8 right-8 text-[#800020] text-3xl hover:rotate-90 transition-all"><i className="fa-solid fa-xmark"></i></button>
                                <div className="space-y-12">
                                    <div className="aspect-video bg-gray-50 rounded-3xl border border-gray-100 overflow-hidden"><img src={selectedResearch.image} className="w-full h-full object-cover" /></div>
                                    <div className="space-y-8"><h3 className="text-4xl font-black text-[#001A35]">{selectedResearch.title}</h3><div className="p-10 bg-[#800020]/5 rounded-[32px] border-l-[12px] border-[#800020] font-serif italic text-lg text-[#800020]">"{selectedResearch.abstract}"</div><button className="w-full py-6 bg-[#800020] text-white font-black text-xl rounded-2xl flex items-center justify-center gap-3 hover:bg-[#001A35] transition-all">원문 아카이브 확인 <i className="fa-solid fa-link"></i></button></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {selectedArchive && (
                        <div className="fixed inset-0 bg-[#001A35]/40 backdrop-blur-md z-[110] flex items-center justify-center p-6" onClick={() => setSelectedArchive(null)}>
                            <div className="bg-white rounded-[40px] p-12 max-w-lg w-full shadow-2xl border-t-[20px] border-[#FFB800]" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-8"><span className="text-[#800020] font-black text-xs tracking-[0.4em] uppercase">{selectedArchive.category}</span><button onClick={() => setSelectedArchive(null)} className="text-gray-300 hover:text-[#001A35] text-2xl"><i className="fa-solid fa-xmark"></i></button></div>
                                <h3 className="text-3xl font-black mb-6 leading-tight text-[#001A35] font-serif italic">{selectedArchive.title}</h3>
                                <div className="h-1.5 w-16 bg-[#001A35] mb-10"></div>
                                <p className="text-gray-600 leading-relaxed text-lg font-serif italic mb-8">"{selectedArchive.content}"</p>
                                <button onClick={() => window.open(selectedArchive.link, '_blank')} className="w-full py-5 bg-[#001A35] text-[#FFB800] text-xs font-black rounded-xl hover:bg-[#800020] hover:text-white transition-all tracking-widest uppercase italic">자료 원본 보기 <i className="fa-solid fa-arrow-right-long ml-2"></i></button>
                            </div>
                        </div>
                    )}

                    {showPasswordModal && (
                        <div className="fixed inset-0 bg-[#001A35]/98 z-[200] flex items-center justify-center p-6">
                            <div className="bg-white p-12 rounded-[48px] max-w-sm w-full text-center space-y-10 shadow-2xl">
                                <div className="w-24 h-24 bg-[#FFB800] rounded-full flex items-center justify-center mx-auto text-[#001A35] text-4xl shadow-inner"><i className="fa-solid fa-user-shield"></i></div>
                                <div className="space-y-2"><h3 className="text-3xl font-black text-[#001A35]">ADMIN</h3><p className="text-xs text-gray-400 font-bold tracking-widest uppercase italic">Identity Verification</p></div>
                                <input type="password" placeholder="••••" value={password} onChange={(e) => setPassword(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAdminLogin()} className="w-full border-b-4 border-[#001A35] py-4 text-center text-4xl font-black tracking-[0.5em] outline-none" autoFocus />
                                <div className="flex gap-4"><button onClick={() => setShowPasswordModal(false)} className="flex-1 py-5 font-black text-gray-400 uppercase tracking-widest">Close</button><button handleAdminLogin onClick={handleAdminLogin} className="flex-1 py-5 bg-[#001A35] text-[#FFB800] font-black rounded-[20px] uppercase tracking-widest">Access</button></div>
                            </div>
                        </div>
                    )}
